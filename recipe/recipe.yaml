# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.14"

package:
  name: wagtail-ab-testing
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-ab-testing/wagtail_ab_testing-${{ version }}.tar.gz
  sha256: 4f47b8965b0837694ebcec21fb5d0c9b5317572d5a2f0c4d8e7b5caf053f86f9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - wagtail >=6.3
    - user-agents >=2.2,<2.3
    - numpy >=1.19.4,<2
    - scipy >=1.5.4,<2

tests:
  - python:
      imports:
        - wagtail_ab_testing
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/wagtail-nest/wagtail-ab-testing
  repository: https://github.com/wagtail-nest/wagtail-ab-testing
  license: BSD-3-Clause
  license_file: LICENSE
  summary: A/B Testing for Wagtail
  description: |
    A/B Testing for Wagtail — split-test traffic between two variants of a
    page and measure conversion against a configured goal. Tracks
    participants + conversions via the user-agents library and offers an
    admin UI for creating, viewing, and concluding tests.

extra:
  recipe-maintainers:
    - rxm7706
