{% set name = "wagtail-ab-testing" %}
{% set version = "0.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: dedef8d399aa068137a817992385f8ab958879507b64261634209b239a28120c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - wagtail >=6.3
    - user-agents >=2.2,<2.3
    - numpy >=1.19.4,<2
    - scipy >=1.5.4,<2

test:
  imports:
    - wagtail_ab_testing
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A/B Testing for Wagtail
  home: https://github.com/wagtail-nest/wagtail-ab-testing
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
