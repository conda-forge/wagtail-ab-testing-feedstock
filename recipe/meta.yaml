{% set name = "wagtail-ab-testing" %}
{% set version = "0.14" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}" 

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 4f47b8965b0837694ebcec21fb5d0c9b5317572d5a2f0c4d8e7b5caf053f86f9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - wagtail >=7.0
    - user-agents >=2.2,<2.3
    - numpy >=1.26,<3
    - scipy >=1.15,<2

test:
  imports:
    - wagtail_ab_testing
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A/B Testing for Wagtail
  home: https://github.com/wagtail-nest/wagtail-ab-testing
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
